<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Obsidian Gallery | Neo-Brutalism</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;700;800&amp;family=Inter:wght@400;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "brutal-bg": "#f5f7f9",

                        "surface-dim": "#0e0e0e",

                        "inverse-primary": "#5e5f60",
                        "on-primary": "#3f4041",
                        "inverse-surface": "#f9f9f9",
                        "on-secondary-fixed-variant": "#5c5b5b",
                        "primary-container": "#454747",
                        "inverse-on-surface": "#555555",
                        "primary-fixed": "#e2e2e2",
                        "on-error": "#490106",
                        "on-tertiary-container": "#3e5868",
                        "error": "#ee7d77",
                        "on-surface": "#e5e5e5",
                        "surface-container-highest": "#262626",
                        "surface-container-low": "#131313",
                        "on-error-container": "#ff9993",
                        "error-container": "#7f2927",
                        "on-secondary-fixed": "#403f3f",
                        "surface-variant": "#262626",
                        "secondary": "#9f9d9d",
                        "on-secondary": "#202020",
                        "background": "#f5f7f9",
                        "secondary-fixed": "#e5e2e1",
                        "primary-fixed-dim": "#d4d4d4",
                        "tertiary-fixed": "#d0ecff",
                        "on-background": "#000000",
                        "on-tertiary-fixed-variant": "#486272",
                        "primary-dim": "#b8b9b9",
                        "outline": "#000000",
                        "secondary-dim": "#9f9d9d",
                        "tertiary-dim": "#c2def0",
                        "surface-container-high": "#1f1f1f",
                        "outline-variant": "#484848",
                        "surface": "#f5f7f9",
                        "primary": "#000000",
                        "on-primary-fixed": "#3e4040",
                        "surface-tint": "#000000",
                        "on-primary-fixed-variant": "#5a5c5c",
                        "on-tertiary": "#466170",
                        "on-secondary-container": "#c1bfbe",
                        "tertiary-fixed-dim": "#c2def0",
                        "on-primary-container": "#d0d0d0",
                        "tertiary": "#eff8ff",
                        "secondary-container": "#3c3b3b",
                        "on-surface-variant": "#ababab",
                        "surface-container": "#f5f7f9",

                        "on-tertiary-fixed": "#2c4655",

                    fontFamily: {
                        "headline": ["Manrope"],

                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        body {
            background-image: url('../imgbg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

        }



        .gallery-container {
            perspective: 2500px;
            transform-style: preserve-3d;
            cursor: grab;
        }

        .gallery-container:active {
            cursor: grabbing;
        }

        .diagonal-strip {
            /* Adjusted tilt to keep cards more centered horizontally/vertically */
            transform: rotateX(5deg) rotateZ(-8deg) translateY(0%);
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .image-card {
            transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1), box-shadow 0.6s cubic-bezier(0.2, 1, 0.3, 1);
            transform: rotateY(-15deg) rotateX(5deg) scale(0.85);
            /* Scaled down slightly for better visibility */
            background-color: #a5b4fc;
            border: 6px solid #000000;
            box-shadow: 12px 12px 0px 0px rgba(0, 0, 0, 1);
            padding: 16px;
            /* Reduced padding to maximize image area */
        }

        .image-card:hover,
        .image-card.active {
            transform: rotateY(0deg) rotateX(0deg) scale(1.0) translateZ(100px);
            z-index: 50;
            box-shadow: 20px 20px 0px 0px rgba(0, 0, 0, 1);
        }

        /* Fixed image alignment: Wrapper does NOT counter-rotate anymore */
        .image-card .image-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 4px solid #000000;
        }

        .progress-circle {
            touch-action: none;
        }

        .dot-handle {
            cursor: grab;
        }

        .dot-handle:active {
            cursor: grabbing;
        }
    </style>
</head>

<body
    class="text-on-background font-body selection:bg-brutal-accent selection:text-black overflow-hidden h-screen w-screen">
    <!-- Background Set In Body -->
    <main class="relative h-screen w-screen flex items-center justify-center overflow-hidden">
        <!-- Scrolling Canvas -->
        <div class="gallery-container w-[200vw] h-full flex items-center justify-center pointer-events-auto"
            id="gallery-container">
            <div class="diagonal-strip flex items-center gap-16 px-[100vw] hide-scrollbar overflow-x-auto snap-x snap-mandatory"
                id="carousel-strip">
                <!-- Cards will be injected via JS -->
            </div>
        </div>
    </main>
    <!-- Interactive Circular Navigation -->
    <div class="fixed bottom-12 right-12 z-50 pointer-events-auto">
        <div class="relative w-40 h-40 flex items-center justify-center group" id="progress-container">
            <svg class="absolute inset-0 w-full h-full -rotate-90 progress-circle overflow-visible">
                <circle class="text-neutral-200" cx="80" cy="80" fill="none" r="70" stroke="currentColor"
                    stroke-width="4"></circle>
                <!-- Progress Indicator -->
                <circle class="text-black transition-all duration-300 ease-out" cx="80" cy="80" fill="none"
                    id="progress-ring" r="70" stroke="currentColor" stroke-dasharray="439.8" stroke-dashoffset="439.8"
                    stroke-width="4"></circle>
                <!-- Draggable Dot Handle -->
                <circle class="dot-handle fill-black" cx="150" cy="80" id="dot-handle" r="10" stroke="white"
                    stroke-width="2"></circle>
            </svg>
            <div class="flex flex-col items-center select-none cursor-pointer relative z-10" id="autoplay-toggle">
                <span class="font-headline text-4xl font-black text-black tracking-tighter" id="current-index">01</span>
                <span class="font-label text-[10px] font-bold tracking-widest text-neutral-600 uppercase mt-1 mb-1">/
                    25</span>
                <span class="material-symbols-outlined text-black font-black transition-transform hover:scale-110"
                    id="play-pause-icon" style="font-size: 24px;">play_arrow</span>
            </div>
        </div>
    </div>
    <script>
        const stripEl = document.getElementById('carousel-strip');
        const ring = document.getElementById('progress-ring');
        const dot = document.getElementById('dot-handle');
        const counter = document.getElementById('current-index');
        const circumference = 2 * Math.PI * 70;

        const images = [
            "https://lh3.googleusercontent.com/aida-public/AB6AXuAYJdfPDJRcYRrESt_5z16Spm-HJ9Hq0t-BDm9eIcqChcNNGvowwwGRmOXRHBsyuB2g6MVikoG1VF-kBYyXoyLxsnoWUVM2lWSOiRExUMnuUQaw3dLtwqZt4a2iz30Bo23bmQYePp8QvW9wDvzR1FTgitEABbNL_nKcWUY_Pl2H6ppoYtFy6jsPUD0Fe0G_3ezmpS3KyPGMRw_SzUckAAjEBkU0r-oDLmFTM2WoA4ImEDlxEcKM91icluhTt9eK-cxmNtdQjqs8geQ",
            "https://lh3.googleusercontent.com/aida-public/AB6AXuItx82tu7JS2O-luhvllBlWhT_0ThPWvQgw35WHNTbvPX12BsO08IwVjdKuApELfzGquNvIs9tN8Vx5AN8qm52xqeTL4fPccMw4DiwhvpqPnVtusK-HCQ13LkJ9qVpAxSJqGn9WF5Of4zVCNP_pX3BbosdWodW8FtWNP12hAO0gYcvNcOZIhsUwBoo3KXm5RJyp6hEbc42_TiM2N4D5ECOtr51NHhzYLkn6CT8NUagreXJcHBeiZVJ4BYAJxk_UntCHPnvgM60Plc",
            "https://lh3.googleusercontent.com/aida-public/AB6AXuA6fRXD2Fe0zM_7ciKarr4Day-3R6UrawBR-fuxhcJET_V2TDiTzBNI1i62ju4O5STUsyLl6Gq-m0nLmzeabTyU67ho15kjUFngnFU4JXtXt_83bEztaNFwKaopFYz6ysA5Dgt7MtxleUByNQG0kIIk-JDuZMrOGKPFjAKoyVbOTGqO5g_KMLxLOhGdwliQf61FLaZyboSewmCszM1CK4_7WnJcNMHFgQ2vvxSBg0BguXoX_7qIeiBea9LyoxNXhiaWXX1ceJcimB4",
            "https://lh3.googleusercontent.com/aida-public/AB6AXuCaVVSa7XPR_92n2UvtLJ5cyqp4741wZu4j6-9mwpjPa1WD-Cvr0BJpaHLaPtOenKllsNiaXWvGUYRZPD8XYHULKg3qHHoVRrzveyKeK7wQvTfFolMk3F_PxFEhofrZPWaME2KET2cDKpHIqJslImHJWfgK7OS_4jjmwZ8mM2__-L3oEiayTHf3fNdPBzLUGQKGpF_-a2aMMlBUGLQzL_v4hX1SN_XoH2ENow_I9eTxqI9b_oK9iy1lt71pSn1Pg5vgMjONMwhPdvU",
            "https://lh3.googleusercontent.com/aida-public/AB6AXuAoWbw4sTC_JOoiV_HMKNZl7c6pN5FE6GGfRGrYvF3OT7ef5kiVGY71Ad3A9jgECf9kFzWd6o2e63dCEimWviFhWOPFB7oE2RpW24tJdpGLCTKSkjUB_UW8nhQoqWpYwt_7r32S3paE9LZ_VJpCzTvZGkfT2ud17dKPI-v_VHtVWueDKwHCJ1EuRP8ik4RtRki61Um1GuJQCv0sg9B58miqp7wdE_hGrZZZzrBrtTeAlkXVl31EYKam2fKCbktnPLPTfEEz33mvZws",
            "https://lh3.googleusercontent.com/aida-public/AB6AXuCwYpDMTYDFT3O2Ibumq5R4C1V1_NHSSWLxVKGm_XyTCTUIdQ4J7VgykjHj6bhmsmux9D9zMbBDbfPN-rrv19sYR6hC8cNo6gbM-VJWeve293d6m2ztean8URdewWoVD0LeU6ARWESJgQc0PEIQVq4Yv10N1eIC5U3lJmux6d5tVUb3qzj1sAgF_8YlbXoW0Nv3WRRB3gcDGGCtiKnf8t4nx1VfD5qzd6apmyNsPCd4s2tURlcymlf3Bz-foZkDhGJO6GuVVw4AtUE",
            "https://lh3.googleusercontent.com/aida-public/AB6AXuCShC5dTeXyGR6R5kPbGhl2fgpLDMinAYNhkF7N8o-LlAKOljV4JU8aTMOqb3IIi7e1WLh6U_D11wroOimW90MKwNcoD8N3aoBRCq3pULJ4sVhz_oxn0E_zjAA-TblYHMEHjnW-EzKczIP6SlUYxOE1XV-FlA9kqaUZdL4bfev9Nua6qUmAYkqC6EEecg_L4LWUP0gHgY-a4f-R0V484pL-EdM_PJiqBJrZtl2qS1DwNLcdV4VTW4IWwo5Arf4a7dzyoZRAJLY15Pc",
            "https://lh3.googleusercontent.com/aida-public/AB6AXuBcDxsRyj9u45E0kbOoylR73ThbszclNcMxAZ52ylBmGLBdlhaYj6z_LEZmLGogdi_JIZOufO7pFb60EP-IdoeqRGCkINLKfSTHc6buKl5tGy4w0j1fI75Pb_7c5S42O3Q6Dy-JiDoCytzQqvIMI3H_xZRUp0X2GhVBxGKkZpBMFNjdgW3dU2kAA0dTn50w5YYjvPOXDuyStjvWzV0Xl-T39y7vZyxWkX_ACS1oG26zLkyuEGi_h3hpxhA3oj5w0lVwpuLEobYLLIM"
        ];

        // Populate gallery - Adjusted card dimensions to be safer for viewport visibility
        for (let i = 0; i < 25; i++) {
            const imgUrl = images[i % images.length];
            const div = document.createElement('div');
            div.className = "image-card group flex-shrink-0 w-[450px] h-[600px] snap-center relative flex flex-col items-center justify-center";
            div.innerHTML = `
            <div class="image-wrapper">
                <img alt="Gallery Image" src="${imgUrl}"/>
            </div>
        `;
            stripEl.appendChild(div);
        }

        let isDragging = false;
        let startX, scrollLeft;
        let velocity = 0;
        let rafId = null;

        // Mouse Wheel Scrolling for Horizontal
        stripEl.addEventListener('wheel', (e) => {
            if (e.deltaY !== 0 || e.deltaX !== 0) {
                e.preventDefault();
                stripEl.scrollLeft += (e.deltaX || e.deltaY) * 1.5;
            }
        }, { passive: false });

        // Keyboard Navigation
        window.addEventListener('keydown', (e) => {
            const scrollAmount = window.innerWidth / 2;
            if (['ArrowRight', 'ArrowDown'].includes(e.key)) {
                e.preventDefault();
                stripEl.scrollBy({ left: scrollAmount, behavior: 'smooth' });
            } else if (['ArrowLeft', 'ArrowUp'].includes(e.key)) {
                e.preventDefault();
                stripEl.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
            } else if (e.key === 'PageDown') {
                e.preventDefault();
                stripEl.scrollBy({ left: stripEl.clientWidth, behavior: 'smooth' });
            } else if (e.key === 'PageUp') {
                e.preventDefault();
                stripEl.scrollBy({ left: -stripEl.clientWidth, behavior: 'smooth' });
            } else if (e.key === 'Home') {
                e.preventDefault();
                stripEl.scrollTo({ left: 0, behavior: 'smooth' });
            } else if (e.key === 'End') {
                e.preventDefault();
                stripEl.scrollTo({ left: stripEl.scrollWidth, behavior: 'smooth' });
            }
        });

        // Drag to scroll logic with inertia
        const galleryContainer = document.getElementById('gallery-container');

        const startDrag = (pageX) => {
            isDragging = true;
            startX = pageX - stripEl.offsetLeft;
            scrollLeft = stripEl.scrollLeft;
            cancelAnimationFrame(rafId);
        };

        const stopDrag = () => {
            if (!isDragging) return;
            isDragging = false;
            applyInertia();
        };

        const doDrag = (pageX, e) => {
            if (!isDragging) return;
            if (e.cancelable) e.preventDefault();
            const x = pageX - stripEl.offsetLeft;
            const walk = (x - startX) * 2;
            const prevScrollLeft = stripEl.scrollLeft;
            stripEl.scrollLeft = scrollLeft - walk;
            velocity = stripEl.scrollLeft - prevScrollLeft;
        };

        galleryContainer.addEventListener('mousedown', (e) => startDrag(e.pageX));
        window.addEventListener('mouseup', stopDrag);
        window.addEventListener('mousemove', (e) => doDrag(e.pageX, e));

        galleryContainer.addEventListener('touchstart', (e) => {
            if (e.target.closest('.diagonal-strip')) return;
            startDrag(e.touches[0].pageX);
        }, { passive: true });
        window.addEventListener('touchend', stopDrag);
        window.addEventListener('touchmove', (e) => {
            if (isDragging) doDrag(e.touches[0].pageX, e);
        }, { passive: false });

        function applyInertia() {
            if (Math.abs(velocity) > 0.5) {
                stripEl.scrollLeft += velocity;
                velocity *= 0.95;
                rafId = requestAnimationFrame(applyInertia);
            }
        }

        // Update visuals based on scroll
        stripEl.addEventListener('scroll', () => {
            const scrollRange = stripEl.scrollWidth - stripEl.clientWidth;
            const scrollPercent = scrollRange > 0 ? stripEl.scrollLeft / scrollRange : 0;
            const offset = circumference - (scrollPercent * circumference);
            ring.style.strokeDashoffset = offset;

            // Update Dot Position
            const angle = scrollPercent * 2 * Math.PI;
            const x = 80 + 70 * Math.cos(angle);
            const y = 80 + 70 * Math.sin(angle);
            dot.setAttribute('cx', x);
            dot.setAttribute('cy', y);

            // Update Index
            const total = 25;
            const index = Math.min(total, Math.ceil(scrollPercent * (total - 1)) + 1);
            counter.textContent = index.toString().padStart(2, '0');

            // Manage active classes for cards
            const cards = document.querySelectorAll('.image-card');
            const stripCenter = stripEl.scrollLeft + stripEl.clientWidth / 2;
            cards.forEach(card => {
                const cardMid = card.offsetLeft + card.clientWidth / 2;
                if (Math.abs(cardMid - stripCenter) < 250) {
                    card.classList.add('active');
                } else {
                    card.classList.remove('active');
                }
            });
        });

        // Circular Marker Dragging
        let isDotDragging = false;
        const handleCircleDrag = (e) => {
            if (!isDotDragging) return;
            const container = document.getElementById('progress-container').getBoundingClientRect();
            const centerX = container.left + container.width / 2;
            const centerY = container.top + container.height / 2;

            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            if (clientX === undefined) return;

            const angle = Math.atan2(clientY - centerY, clientX - centerX);
            let normalizedAngle = angle + Math.PI / 2;
            if (normalizedAngle < 0) normalizedAngle += 2 * Math.PI;
            if (normalizedAngle > 2 * Math.PI) normalizedAngle -= 2 * Math.PI;

            const percent = normalizedAngle / (2 * Math.PI);
            stripEl.scrollTo({
                left: percent * (stripEl.scrollWidth - stripEl.clientWidth),
                behavior: 'auto'
            });
        };

        dot.addEventListener('mousedown', (e) => { e.stopPropagation(); isDotDragging = true; });
        window.addEventListener('mouseup', () => isDotDragging = false);
        window.addEventListener('mousemove', handleCircleDrag);

        dot.addEventListener('touchstart', (e) => { e.stopPropagation(); isDotDragging = true; }, { passive: false });
        window.addEventListener('touchend', () => isDotDragging = false);
        window.addEventListener('touchmove', handleCircleDrag, { passive: false });

        // Initial trigger
        setTimeout(() => {
            stripEl.scrollLeft = 1;
            stripEl.dispatchEvent(new Event('scroll'));
        }, 100);

        // Autoplay Logic
        let isAutoplay = false;
        let autoplayRaf;
        const playBtn = document.getElementById('play-pause-icon');
        const autoplayToggle = document.getElementById('autoplay-toggle');

        function autoplayStep() {
            if (!isAutoplay) return;
            stripEl.style.scrollSnapType = 'none';
            stripEl.scrollLeft += 8.5;

            if (stripEl.scrollLeft >= stripEl.scrollWidth - stripEl.clientWidth - 2) {
                stripEl.scrollLeft = 0;
            }
            autoplayRaf = requestAnimationFrame(autoplayStep);
        }

        autoplayToggle.addEventListener('click', (e) => {
            if (e.target.closest('#dot-handle')) return;
            isAutoplay = !isAutoplay;

            if (isAutoplay) {
                playBtn.textContent = 'pause';
                autoplayRaf = requestAnimationFrame(autoplayStep);
            } else {
                playBtn.textContent = 'play_arrow';
                cancelAnimationFrame(autoplayRaf);
                stripEl.style.scrollSnapType = 'x mandatory';
            }
        });

        const stopAutoplay = () => {
            if (isAutoplay) {
                isAutoplay = false;
                playBtn.textContent = 'play_arrow';
                cancelAnimationFrame(autoplayRaf);
                stripEl.style.scrollSnapType = 'x mandatory';
            }
        };

        stripEl.addEventListener('touchstart', stopAutoplay, { passive: true });
        stripEl.addEventListener('mousedown', stopAutoplay);
        stripEl.addEventListener('wheel', stopAutoplay, { passive: true });
    </script>
</body>

</html>
